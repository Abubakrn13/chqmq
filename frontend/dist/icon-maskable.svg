<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F6E78"/>
      <stop offset="1" stop-color="#063139"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE7A6"/>
      <stop offset="1" stop-color="#C2922E"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background — Android will crop to circle/squircle/rounded rect -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <!-- Bolt scaled to safe zone (centred 60% of canvas) -->
  <path d="M285 155 L200 285 h60 l-20 84 l92 -134 h-60 z"
        fill="url(#bolt)" stroke="#FFE7A6" stroke-width="4" stroke-linejoin="round"/>
</svg>
